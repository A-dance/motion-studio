<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motion Studio — 動きの譜面</title>
  <link rel="stylesheet" href="/web/css/score.css" />
</head>
<body>
  <h1 class="sr-only">ダンス自習ダッシュボード — 骨格オーバーレイと16カウントタイムライン</h1>

  <div class="dance-root" id="root">
    <header class="dance-header">
      <span class="dance-logo">Motion Studio</span>
      <div class="dance-status">
        <span class="dot-live"></span>
        <span id="rec-status">LOAD READY</span>
      </div>
    </header>

    <details class="setup-panel" open>
      <summary>Setup — 動画・譜面・人物</summary>
      <div class="setup-inner">
        <label for="videoPath">Video</label>
        <input id="videoPath" type="text" value="data/videos/PXL_20260228_101825443.mp4" />
        <label for="scorePath">Score JSON</label>
        <input id="scorePath" type="text" value="data/output/PXL_20260228_101825443_score.json" />
        <div class="row">
          <button type="button" id="loadBtn" class="primary">Load</button>
          <button type="button" id="sampleBtn" class="ghost">PXL</button>
          <button type="button" id="generateBtn" class="primary hidden" disabled>Generate</button>
          <button type="button" id="rescanBtn" class="ghost hidden">Rescan</button>
        </div>
        <p id="scanMeta" class="sheet-meta">動画を読み込むと人物を認識します。</p>
        <div id="personGallery" class="person-gallery"></div>
        <p id="pickStatus" class="pick-status hidden"></p>
        <p id="err" class="error hidden"></p>
      </div>
    </details>

    <div class="main-area">
      <section class="avatar-section">
        <div class="avatar-canvas" id="avatarCanvas">
          <div class="grid-overlay"></div>
          <div class="corner-tl"></div>
          <div class="corner-tr"></div>
          <div class="corner-bl"></div>
          <div class="corner-br"></div>
          <div class="scan-line"></div>
          <div class="video-wrap" id="videoWrap">
            <video id="player" controls playsinline></video>
            <canvas id="overlay"></canvas>
          </div>
        </div>
        <div class="avatar-toolbar">
          <span class="tempo-display" id="tempoDisp">♩= — BPM</span>
          <span class="tempo-display" id="nowLabel">—</span>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-section">
          <div class="panel-title">Session</div>
          <div class="info-row">
            <span class="info-label">Phrase</span>
            <span class="info-val" id="phraseVal">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Count</span>
            <span class="info-val" id="countVal">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Time</span>
            <span class="info-val" id="timeVal">—</span>
          </div>
        </div>
        <div class="panel-section" style="flex: 1; border-bottom: none">
          <div class="panel-title">Selected Beat</div>
          <div id="beatInfo">—<br>カウントをクリック</div>
        </div>
      </aside>
    </div>

    <section class="timeline-section hidden" id="sheetPanel">
      <div class="timeline-header">
        <span class="tl-title">16 Count Timeline</span>
        <span class="tl-mode" id="tlMode">COUNT MODE</span>
      </div>
      <div id="sheetTimeline"></div>
    </section>
  </div>

  <script type="module" src="/web/js/app.js"></script>
</body>
</html>
