<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danceノート</title>
  <script type="importmap">
  {
    "imports": {
      "three": "/web/vendor/three/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="/web/css/studio.css" />
</head>
<body>
<div class="app">

  <!-- ═══ 左ツールバー ═══════════════════════════════════ -->
  <aside class="toolbar">
    <div class="toolbar-brand">
      <span class="brand-d">D</span>
    </div>

    <button class="tool-btn is-active" data-tool="select" title="選択・ポーズ編集">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M4 2 L4 16 L8 12 L11 18 L13 17 L10 11 L15 11 Z" fill="currentColor"/>
      </svg>
      <span>選択</span>
    </button>

    <button class="tool-btn" data-tool="orbit" title="視点を回す">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="10" r="7"/>
        <line x1="10" y1="3" x2="10" y2="17"/>
        <line x1="3" y1="10" x2="17" y2="10"/>
      </svg>
      <span>移動</span>
    </button>

    <div class="toolbar-sep"></div>

    <button class="tool-btn" data-tool="arrow" title="矢印アノテーションを追加" id="btnAddStraightArrow">
      <svg viewBox="0 0 20 20" fill="none">
        <line x1="4" y1="16" x2="16" y2="5" stroke="#ffbf00" stroke-width="2.2" stroke-linecap="round"/>
        <polygon points="16,5 9,6 14,11" fill="#ffbf00"/>
      </svg>
      <span>矢印</span>
    </button>

    <button class="tool-btn" data-tool="spin" title="回転矢印を追加" id="btnAddSpinArrow">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 3 a7 7 0 1 0 6 3.5" stroke="#4888b8" stroke-width="2" stroke-linecap="round" fill="none"/>
        <polygon points="16,6.5 12,3 17,2" fill="#4888b8"/>
      </svg>
      <span>円弧</span>
    </button>

    <button class="tool-btn" data-tool="text" title="文字メモを追加" id="btnAddText">
      <svg viewBox="0 0 20 20" fill="none">
        <text x="3" y="16" font-family="sans-serif" font-size="14" font-weight="700" fill="currentColor">T</text>
      </svg>
      <span>文字</span>
    </button>

    <div class="toolbar-spacer"></div>

    <!-- 文字入力フィールド（テキストツール選択時に展開） -->
    <div class="toolbar-text-field hidden" id="toolTextFieldWrap">
      <input type="text" id="fieldMotion" placeholder="文字…" class="toolbar-text-input" />
    </div>
  </aside>

  <!-- ═══ センター: ステージ + トランスポート ════════════ -->
  <div class="center-col">

    <!-- 3D ステージ ---------------------------------------- -->
    <div class="stage-wrap" id="stageWrap">
      <div id="viewport3d"></div>
      <canvas id="annotCanvas" aria-label="矢印・文字レイヤー"></canvas>

      <!-- カウント表示（右上） -->
      <div class="stage-status">
        <div class="ss-count">編集中 <strong id="currentCountLabel">A – 1 / 16</strong></div>
        <span id="palmrot-display" class="palmrot-display" hidden></span>
      </div>
    </div>

    <!-- トランスポートバー ------------------------------------- -->
    <div class="transport-bar">
      <!-- フレーズ + カウントチップ（スクロール可能） -->
      <div id="phraseTimeline" class="phrase-timeline"></div>

      <div class="transport-right">
        <div class="body-yaw-panel">
          <div class="transport-caption">体の向き</div>
          <div class="body-yaw-controls">
            <button type="button" id="btnBodyYawLeft" class="tb-yaw-arrow" title="左に回す">←</button>
            <button type="button" class="tb-view-btn" data-yaw-preset="front" title="正面を向く">正面</button>
            <button type="button" class="tb-view-btn" data-yaw-preset="back" title="後ろを向く">後ろ</button>
            <button type="button" id="btnBodyYawRight" class="tb-yaw-arrow" title="右に回す">→</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /center-col -->

  <!-- ═══ 右パネル ══════════════════════════════════════ -->
  <aside class="right-panel">

    <div class="rp-section" id="songOverviewSection">
      <div class="rp-title">曲の構成</div>
      <div id="songOverviewList" class="song-overview-list"></div>
    </div>

    <!-- 矢印の調整（アイテム選択時のみ表示） -->
    <div id="itemControls" class="item-ctrl--idle rp-section">
      <div class="rp-title" id="itemCtrlTitle">矢印の調整</div>
      <div class="sp">
        <label>角度 <span id="dirAngleLbl">90°</span></label>
        <input type="range" id="dirAngle" min="0" max="359" value="90" />
      </div>
      <div class="sp">
        <label>大きさ <span id="dirPowerLbl">45%</span></label>
        <input type="range" id="dirPower" min="15" max="100" value="45" />
      </div>
      <div class="sp" id="bendRow">
        <label>曲がり <span id="dirBendLbl">0</span></label>
        <input type="range" id="dirBend" min="-100" max="100" value="0" />
      </div>
      <div class="sp" id="tiltRow">
        <label>傾き <span id="dirTiltLbl">0°</span></label>
        <input type="range" id="dirTilt" min="0" max="359" value="0" />
      </div>
      <div class="rp-row rp-row--end">
        <button id="btnDeleteItem" class="btn-del" disabled>🗑 削除</button>
        <span class="add-fb" id="addFeedback"></span>
      </div>
    </div>

    <!-- ポーズ操作 -->
    <div class="rp-section" id="poseEditSection">
      <div class="rp-title">ポーズ操作</div>
      <div class="pose-action-btns">
        <button type="button" id="btnResetPose" class="rf-btn pose-action-btn" title="立ち姿に戻す">↺ リセット</button>
        <button type="button" id="btnUndoPose" class="rf-btn pose-action-btn" title="1つ前のポーズに戻す" disabled>← 戻る</button>
      </div>
    </div>

    <!-- カウント参照 + メモ -->
    <div class="rp-section" id="countRefSection">
      <div class="rp-title">カウント参照</div>
      <label class="rp-sublabel" for="countMemo">このカウントのメモ</label>
      <textarea id="countMemo" class="count-memo-input" rows="2"
                placeholder="例: ここで右に体重移動"></textarea>
      <label class="rp-sublabel rp-sublabel--spaced" for="countRefSearch">他のポーズを検索して適用</label>
      <input type="search" id="countRefSearch" class="count-ref-search"
             placeholder="A-2 や保存ポーズ名…" autocomplete="off" spellcheck="false" />
      <p id="countRefHint" class="rp-hint count-ref-hint">カウント名（A-2）や保存ポーズ名の一部を入力</p>
      <div id="countRefList" class="count-ref-list"></div>
    </div>

    <!-- 保存ポーズライブラリ -->
    <div class="rp-section" id="poseLibrarySection">
      <div class="rp-title">保存ポーズ</div>
      <p class="rp-hint">名前を付けて保存 → ワンクリックで現在のカウントに適用</p>
      <div class="rp-pose-save">
        <input type="text" id="poseNameInput" class="rp-work-name"
               placeholder="ポーズ名…" autocomplete="off" />
        <button id="btnSavePose" class="rf-btn rf-btn--gold" title="現在のポーズを保存">保存</button>
      </div>
      <div id="poseLibraryList" class="pose-library-list"></div>
    </div>

    <!-- 余白 -->
    <div class="rp-spacer"></div>

    <div class="rp-section" id="workLibrarySection">
      <div class="rp-title">振り付けライブラリ</div>
      <p class="rp-hint">💾 保存するたびにここに記録されます</p>
      <div id="workLibraryList" class="pose-library-list"></div>
    </div>

    <!-- フッター: 作品管理 + タブ -->
    <div class="rp-footer">
      <div class="rp-tabs">
        <button class="rtab is-active">FILE</button>
        <button class="rtab">VIEW</button>
      </div>
      <input type="text" id="workName" class="rp-work-name"
             placeholder="workName" autocomplete="off" spellcheck="false" />
      <div class="rp-footer-btns">
        <button id="btnSaveWork"  class="rf-btn" title="保存 (localStorage)">💾</button>
        <button id="btnNewWork"   class="rf-btn" title="新しい作品">＋</button>
        <button id="btnAddPhrase" class="rf-btn" title="フレーズ追加">⊕</button>
        <button id="btnExport"    class="rf-btn" title="JSON ファイルに書き出し（バックアップ）">↑</button>
        <button id="btnImport"    class="rf-btn" title="JSON ファイルを読み込み">↓</button>
      </div>
    </div>

  </aside>

</div><!-- /app -->

<!-- キーボードショートカット オーバーレイ -->
<div id="kbdOverlay" class="kbd-overlay hidden">
  <div class="kbd-box">
    <div class="kbd-title">キーボードショートカット</div>
    <div class="kbd-grid">
      <div class="kbd-row"><kbd>←</kbd><span>前のカウント</span></div>
      <div class="kbd-row"><kbd>→</kbd><span>次のカウント</span></div>
      <div class="kbd-row"><kbd>Esc</kbd><span>選択解除・ツールをリセット</span></div>
      <div class="kbd-row"><kbd>Del / BS</kbd><span>選択アイテムを削除</span></div>
      <div class="kbd-row"><kbd>?</kbd><span>このヘルプを表示 / 閉じる</span></div>
    </div>
    <div class="kbd-section-title">ドラッグ操作</div>
    <div class="kbd-grid">
      <div class="kbd-row"><kbd>ドラッグ</kbd><span>関節を移動</span></div>
      <div class="kbd-row"><kbd>Shift+ドラッグ</kbd><span>手前 / 奥へ移動</span></div>
    </div>
    <button id="btnCloseKbd" class="kbd-close">閉じる</button>
  </div>
</div>

<!-- インライン文字編集（fixed オーバーレイ） -->
<div id="inlineEdit" class="inline-edit hidden">
  <input type="text" id="inlineEditInput" class="inline-edit-input" />
</div>

<script type="module" src="/web/js/app.js"></script>
</body>
</html>
