<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danceノート</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="/web/css/studio.css" />
</head>
<body>
  <div class="app">

    <!-- ヘッダー -->
    <header class="header">
      <h1 class="brand-title">Dance <span>Sequence</span> Note</h1>
      <div class="work-controls">
        <input type="text" id="workName" class="work-name-input"
          placeholder="作品名…" autocomplete="off" spellcheck="false" />
        <button type="button" id="btnSaveWork" class="btn-hd">💾</button>
        <button type="button" id="btnNewWork"  class="btn-hd">＋</button>
      </div>
    </header>

    <main class="main">

      <!-- ── 左: 3Dステージ + アノテーションオーバーレイ ── -->
      <section class="panel panel-stage">
        <div class="stage-topbar">
          <span class="count-badge" id="currentCountLabel">A – 1</span>
          <span class="stage-hint-inline" id="stageHintInline">関節ドラッグ: ポーズ · 背景ドラッグ: 視点回転</span>
        </div>
        <!-- Three.js + 2D アノテーション -->
        <div class="stage-wrap" id="stageWrap">
          <div id="viewport3d"></div>
          <canvas id="annotCanvas" aria-label="矢印・文字レイヤー"></canvas>
        </div>
        <p class="stage-foot">
          <kbd>←</kbd><kbd>→</kbd> カウント移動 &nbsp;·&nbsp;
          文字は <strong>ダブルクリック</strong> で直接編集 &nbsp;·&nbsp;
          <kbd>Delete</kbd> で削除
        </p>
      </section>

      <!-- ── 右: コントロール（スクロールなし・コンパクト） ── -->
      <section class="panel panel-ctrl">

        <!-- ① フレーズ / カウント -->
        <div class="cb">
          <div class="cb-head">
            <span class="cb-title">フレーズ</span>
            <button type="button" id="btnAddPhrase" class="btn-xs-link">＋追加</button>
          </div>
          <div id="phraseTimeline" class="phrase-timeline"></div>
        </div>

        <!-- ② ポーズ -->
        <div class="cb">
          <div class="cb-head">
            <span class="cb-title">ポーズ</span>
            <span class="cb-btns">
              <button type="button" data-preset="reset" class="btn-xs">リセット</button>
              <button type="button" id="btnCopyCount"  class="btn-xs">次へ →</button>
            </span>
          </div>
          <div class="sp">
            <label>向き <span id="bodyYawLbl">0°</span></label>
            <input type="range" id="bodyYaw" min="0" max="359" value="0" />
          </div>
          <div class="sp">
            <label>頭  <span id="headYawLbl">0°</span></label>
            <input type="range" id="headYaw" min="-90" max="90" value="0" />
          </div>
          <div class="view-presets">
            <button class="btn-view" data-view="front">正面</button>
            <button class="btn-view" data-view="diag">斜め</button>
            <button class="btn-view" data-view="side">横</button>
          </div>
        </div>

        <!-- ③ 追加ツールバー -->
        <div class="cb">
          <div class="cb-head">
            <span class="cb-title">追加</span>
            <span class="add-fb" id="addFeedback" aria-live="polite"></span>
          </div>
          <div class="add-toolbar">
            <button type="button" class="btn-add" id="btnAddStraightArrow" title="進む矢印">
              <svg viewBox="0 0 24 24" fill="none">
                <line x1="5" y1="19" x2="19" y2="8" stroke="#c8a038" stroke-width="2.8" stroke-linecap="round"/>
                <polygon points="19,8 12,8 19,15" fill="#c8a038"/>
              </svg>
              矢印
            </button>
            <button type="button" class="btn-add" id="btnAddSpinArrow" title="回転の矢印">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 4a8 8 0 1 0 7 4" stroke="#4888b8" stroke-width="2.6" stroke-linecap="round" fill="none"/>
                <polygon points="19,8 15,4 23,6" fill="#4888b8"/>
              </svg>
              回転
            </button>
            <button type="button" class="btn-add" id="btnAddText" title="文字メモ">
              <svg viewBox="0 0 24 24" fill="none">
                <text x="5" y="18" font-family="sans-serif" font-size="15" font-weight="700" fill="#be8898">T</text>
              </svg>
              文字
            </button>
            <input type="text" id="fieldMotion" class="field-mini" placeholder="文字内容…" />
          </div>
        </div>

        <!-- ④ 矢印の調整（選択時のみ表示） -->
        <div id="itemControls" class="cb item-ctrl--idle">
          <div class="cb-head">
            <span class="cb-title" id="itemCtrlTitle">矢印の調整</span>
            <button type="button" id="btnDeleteItem" class="btn-del" disabled>🗑 削除</button>
          </div>
          <div class="arrow-sliders">
            <div class="sp"><label>角度 <span id="dirAngleLbl">90°</span></label>
              <input type="range" id="dirAngle" min="0" max="359" value="90" /></div>
            <div class="sp"><label>大きさ <span id="dirPowerLbl">45%</span></label>
              <input type="range" id="dirPower" min="15" max="100" value="45" /></div>
            <div class="sp" id="bendRow"><label>曲がり <span id="dirBendLbl">0</span></label>
              <input type="range" id="dirBend" min="-100" max="100" value="0" /></div>
            <div class="sp" id="tiltRow"><label>傾き <span id="dirTiltLbl">0°</span></label>
              <input type="range" id="dirTilt" min="0" max="359" value="0" /></div>
          </div>
        </div>

        <!-- フッター -->
        <div class="cb-foot">
          <p class="save-hint" id="saveHint"></p>
        </div>

      </section>
    </main>
  </div>

  <!-- インライン文字編集（position:fixed オーバーレイ） -->
  <div id="inlineEdit" class="inline-edit hidden">
    <input type="text" id="inlineEditInput" class="inline-edit-input" />
  </div>

  <script type="module" src="/web/js/app.js"></script>
</body>
</html>
